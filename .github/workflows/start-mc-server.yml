name: Start MC Server

on:
  repository_dispatch:
    types: [mc-server-start]

jobs:
  start:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install and start Aternos server
        env:
          ATERNOS_USERNAME: ${{ secrets.ATERNOS_USERNAME }}
          ATERNOS_PASSWORD: ${{ secrets.ATERNOS_PASSWORD }}
          PLAYER_NAME:      ${{ github.event.client_payload.player_name }}
        run: |
          python -m pip install --quiet "git+https://github.com/DarkCat09/python-aternos.git"
          python -c "import aternos; print('aternos module OK')"
          python scripts/gaming/start_aternos.py
