name: Sync Garmin Health Data

on:
  schedule:
    - cron: '0 9 * * *' # 9 AM UTC daily (Garmin syncs overnight from device)
  workflow_dispatch:
    inputs:
      since:
        description: 'Sync from YYYY-MM-DD (default: last 30 days)'
        required: false
        default: ''

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r scripts/health-ingestion/requirements.txt

      - name: Write service account key
        run: python -c "import os; open('/tmp/sa.json','w').write(os.environ['SA_JSON'])"
        env:
          SA_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}

      - name: Sync Garmin activities
        run: |
          SINCE="${{ github.event.inputs.since }}"
          if [ -n "$SINCE" ]; then
            python scripts/health-ingestion/ingest_garmin.py --api --since "$SINCE"
          else
            python scripts/health-ingestion/ingest_garmin.py --api
          fi
        env:
          GARMIN_EMAIL:                ${{ secrets.GARMIN_EMAIL }}
          GARMIN_PASSWORD:             ${{ secrets.GARMIN_PASSWORD }}
          GOOGLE_SERVICE_ACCOUNT_JSON: /tmp/sa.json
          SPREADSHEET_NAME:            ${{ secrets.SPREADSHEET_NAME }}
