name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate build env
        env:
          VITE_GOOGLE_CLIENT_ID: ${{ vars.VITE_GOOGLE_CLIENT_ID || secrets.VITE_GOOGLE_CLIENT_ID }}
          VITE_SHEETS_SPREADSHEET_ID: ${{ vars.VITE_SHEETS_SPREADSHEET_ID || secrets.VITE_SHEETS_SPREADSHEET_ID }}
          VITE_SHEETS_API_KEY: ${{ vars.VITE_SHEETS_API_KEY || secrets.VITE_SHEETS_API_KEY }}
          VITE_SHEETS_API_BASE_URL: ${{ vars.VITE_SHEETS_API_BASE_URL || secrets.VITE_SHEETS_API_BASE_URL }}
          VITE_TODOIST_API_TOKEN: ${{ vars.VITE_TODOIST_API_TOKEN || secrets.VITE_TODOIST_API_TOKEN }}
        run: |
          test -n "$VITE_GOOGLE_CLIENT_ID" || { echo "Missing VITE_GOOGLE_CLIENT_ID"; exit 1; }
          test -n "$VITE_SHEETS_SPREADSHEET_ID" || { echo "Missing VITE_SHEETS_SPREADSHEET_ID"; exit 1; }
          test -n "$VITE_SHEETS_API_KEY" || { echo "Missing VITE_SHEETS_API_KEY"; exit 1; }
          test -n "$VITE_SHEETS_API_BASE_URL" || { echo "Missing VITE_SHEETS_API_BASE_URL"; exit 1; }
          test -n "$VITE_TODOIST_API_TOKEN" || { echo "Missing VITE_TODOIST_API_TOKEN"; exit 1; }

      - name: Build
        run: npm run build
        env:
          VITE_GOOGLE_CLIENT_ID: ${{ vars.VITE_GOOGLE_CLIENT_ID || secrets.VITE_GOOGLE_CLIENT_ID }}
          VITE_SHEETS_SPREADSHEET_ID: ${{ vars.VITE_SHEETS_SPREADSHEET_ID || secrets.VITE_SHEETS_SPREADSHEET_ID }}
          VITE_SHEETS_API_KEY: ${{ vars.VITE_SHEETS_API_KEY || secrets.VITE_SHEETS_API_KEY }}
          VITE_SHEETS_API_BASE_URL: ${{ vars.VITE_SHEETS_API_BASE_URL || secrets.VITE_SHEETS_API_BASE_URL }}
          VITE_TODOIST_API_TOKEN: ${{ vars.VITE_TODOIST_API_TOKEN || secrets.VITE_TODOIST_API_TOKEN }}
          VITE_API_URL: ${{ vars.VITE_API_URL || secrets.VITE_API_URL }}
          VITE_API_KEY: ${{ secrets.VITE_API_KEY }}

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
