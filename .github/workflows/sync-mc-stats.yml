name: Sync MC Player Stats

on:
  schedule:
    # Runs daily at 3 AM UTC (after most play sessions end)
    - cron: '0 3 * * *'
  workflow_dispatch: # allow manual trigger from GitHub Actions tab

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Sync player stats from Aternos
        run: |
          python -m pip install --quiet "git+https://github.com/DarkCat09/python-aternos.git"
          python scripts/gaming/sync_player_stats.py
        env:
          ATERNOS_USERNAME:  ${{ secrets.ATERNOS_USERNAME }}
          ATERNOS_PASSWORD:  ${{ secrets.ATERNOS_PASSWORD }}
          SHEETS_SCRIPT_URL: ${{ secrets.SHEETS_SCRIPT_URL }}
