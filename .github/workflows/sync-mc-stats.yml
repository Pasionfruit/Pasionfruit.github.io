name: Sync MC Player Stats

on:
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Playwright
        run: |
          pip install playwright
          playwright install chromium --with-deps

      - name: Sync player stats from Aternos
        run: python scripts/gaming/sync_player_stats.py
        env:
          ATERNOS_USERNAME:  ${{ secrets.ATERNOS_USERNAME }}
          ATERNOS_PASSWORD:  ${{ secrets.ATERNOS_PASSWORD }}
          SHEETS_SCRIPT_URL: ${{ secrets.SHEETS_SCRIPT_URL }}

      - name: Upload debug files
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sync-debug
          path: |
            /tmp/sync-*.png
            /tmp/sync-*.html
          if-no-files-found: ignore
